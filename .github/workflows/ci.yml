name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Python validation lane
        run: python scripts/ci_checks.py python

  web-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: interfaces/web/package-lock.json

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install web dependencies
        run: npm ci --prefix interfaces/web

      - name: Install Playwright Chromium
        working-directory: interfaces/web
        run: npx playwright install --with-deps chromium

      - name: Run web validation lane
        run: python scripts/ci_checks.py web
